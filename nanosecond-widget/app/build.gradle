plugins {
    id 'com.android.application'
}

android {
    namespace 'com.nanosecond.widget'
    compileSdk 34

    defaultConfig {
        applicationId "com.nanosecond.widget"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // El binario Crystal ARM64 va en assets/
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

android.packagingOptions {
    jniLibs {
        useLegacyPackaging = true
    }
}
